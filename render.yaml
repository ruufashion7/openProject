# Render Blueprint — free Docker web service for the Spring Boot API.
# Dashboard: New → Blueprint → connect this repo, or add as Web Service from Dockerfile.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: openproject-backend
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECURITY_ENCRYPTION_KEY
        generateValue: true
      - key: SECURITY_JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false

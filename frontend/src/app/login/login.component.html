<section class="auth-page">
  <div class="card auth-card">
    <h1 class="page-title">Sign in</h1>
    <p class="page-subtitle">Enter your credentials to continue</p>

    <form (ngSubmit)="submit()" #loginForm="ngForm">
      <label>
        Username
        <input
          name="username"
          [(ngModel)]="username"
          required
          autocomplete="username"
        />
      </label>

      <label>
        Password
        <input
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
        />
      </label>

      <p class="status-text failed" *ngIf="error">{{ error }}</p>

      <button class="btn btn-primary" type="submit" [disabled]="!loginForm.valid">Login</button>
    </form>
  </div>
</section>

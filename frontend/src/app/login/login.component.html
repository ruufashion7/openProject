<section class="auth-page">
  <div class="card auth-card">
    <h1 class="page-title">Sign in</h1>
    <p class="page-subtitle">Enter your credentials to continue</p>

    <form (ngSubmit)="submit()" #loginForm="ngForm">
      <label>
        Username
        <input
          name="username"
          [(ngModel)]="username"
          required
          autocomplete="username"
          [disabled]="loading"
        />
      </label>

      <label>
        Password
        <input
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          [disabled]="loading"
        />
      </label>

      <p class="status-text failed" *ngIf="error">{{ error }}</p>
      <p class="status-text muted" *ngIf="loading && !error">Signing in…</p>

      <button
        class="btn btn-primary login-submit"
        type="submit"
        [disabled]="!loginForm.valid || loading"
        [attr.aria-busy]="loading"
      >
        <span class="login-btn-inner" [class.is-loading]="loading">
          <span class="spinner" *ngIf="loading" aria-hidden="true"></span>
          <span>{{ loading ? 'Signing in…' : 'Login' }}</span>
        </span>
      </button>
    </form>
  </div>
</section>

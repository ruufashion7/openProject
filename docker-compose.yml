services:
  mongo:
    image: mongo:7
    container_name: openproject-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: openproject-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/openProject
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: openproject-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mongo_data:


services:
  mongo:
    image: mongo:7
    container_name: openproject-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: openproject-backend
    ports:
      - "8080:8080"
    environment:
      # Local Mongo in Docker (overrides Atlas default in application.properties)
      - MONGO_URI=mongodb://mongo:27017/openProject
      # Override in production via compose env / Render secrets
      - SECURITY_JWT_SECRET=openProject-dev-jwt-secret-change-in-prod-32b!
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: openproject-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mongo_data:


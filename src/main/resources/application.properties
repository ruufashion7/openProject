# Increase upload limits for large Excel files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=1000MB
spring.data.mongodb.repositories.enabled=true
spring.data.mongodb.max-connection-pool-size=100
spring.data.mongodb.min-connection-pool-size=10
spring.data.mongodb.max-connection-idle-time=30000
spring.data.mongodb.max-connection-life-time=300000
spring.data.mongodb.heartbeat-frequency=10000
spring.data.mongodb.min-heartbeat-frequency=5000
spring.data.mongodb.server-selection-timeout=45000
spring.data.mongodb.socket-timeout=60000
spring.data.mongodb.connect-timeout=15000
spring.data.mongodb.retry-writes=true
spring.data.mongodb.retry-reads=true
spring.data.mongodb.max-retry-time=30000
spring.data.mongodb.application-name=RuleManager

# Security Configuration
# Request size limits
server.tomcat.max-http-post-size=1000MB
server.tomcat.max-http-form-post-size=1000MB

# Security headers (will be enforced by SecurityConfig)
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Rate limiting configuration
security.rate-limit.login.max-attempts=5
security.rate-limit.login.window-minutes=15
security.rate-limit.api.max-requests=100
security.rate-limit.api.window-minutes=1

# Session configuration
security.session.duration-minutes=45
security.session.max-concurrent-sessions=5

# Password policy
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special=true

# Default admin credentials - SECURITY: Set via environment variables, never hardcode
security.admin.default-username=${ADMIN_USERNAME:}
security.admin.default-password=${ADMIN_PASSWORD:}
security.admin.default-display-name=${ADMIN_DISPLAY_NAME:admin}

# HTTPS Configuration
# SECURITY: Enable HTTPS in production
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=${SSL_KEYSTORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:}
server.ssl.trust-store=${SSL_TRUSTSTORE:}
server.ssl.trust-store-password=${SSL_TRUSTSTORE_PASSWORD:}

# HTTP to HTTPS redirect (configure reverse proxy or use HttpsConfig)
server.port=${SERVER_PORT:8080}

# Force HTTPS in production (set to true in production)
security.force-https=${FORCE_HTTPS:false}

# Encryption Configuration
# SECURITY: Set encryption key via environment variable SECURITY_ENCRYPTION_KEY
# Generate key: openssl rand -base64 32
security.encryption.key=${SECURITY_ENCRYPTION_KEY:}


# Mongo connection — set MONGO_URI in production (Render). Local Atlas (Compass): see .env.local.properties.example
# Default: local Mongo (Docker: docker compose / localhost:27017). Optional override: copy .env.local.properties.example → .env.local.properties (gitignored)
mongo_uri=${MONGO_URI:mongodb://localhost:27017/openProject}

# Optional Redis for shared rate limits: set spring.data.redis.url (or env SPRING_DATA_REDIS_URL). backend=auto|redis|memory
security.rate-limit.backend=auto
# Local / non-prod: disable Redis health if Redis is off. With profile prod and no Redis URL, DisableRedisUnlessConfiguredEnvironmentPostProcessor excludes Redis and sets this false.
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:true}

# Increase upload limits for large Excel files
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=1000MB
# POST /api/upload returns 202 after files are stored; Excel parse + Mongo ingest runs in a background thread (avoids proxy 502 on long upstream waits).
# If 502 still happens while the browser is uploading the multipart body, increase nginx/Cloudflare/load balancer client body and read timeouts.

# Async upload watchdog (stuck / runaway jobs): soft interrupt after max duration, then force-release lock after grace.
upload.async.max-duration-minutes=120
upload.async.grace-after-max-minutes=5
upload.watchdog.interval-ms=60000
upload.watchdog.initial-delay-ms=120000
# Cluster-wide ingest lock (MongoDB). Must cover max parse + save time; watchdog can clear expired locks.
upload.distributed-lock-lease-hours=4
# ISO-8601 for Instant/OffsetDateTime in JSON (avoids numeric epoch ambiguity on clients)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.data.mongodb.repositories.enabled=true
# When true, runs customer_master dedupe + unique index on startup (same as POST /api/admin/customer-master/dedupe). Use once then set false.
app.customer-master.dedupe-on-startup=false
# Create @CompoundIndex / @Indexed definitions on startup (upload audit + sessions). Disable in prod if you manage indexes in Atlas only.
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.max-connection-pool-size=100
spring.data.mongodb.min-connection-pool-size=10
spring.data.mongodb.max-connection-idle-time=30000
spring.data.mongodb.max-connection-life-time=300000
spring.data.mongodb.heartbeat-frequency=10000
spring.data.mongodb.min-heartbeat-frequency=5000
spring.data.mongodb.server-selection-timeout=45000
spring.data.mongodb.socket-timeout=60000
spring.data.mongodb.connect-timeout=15000
spring.data.mongodb.retry-writes=true
spring.data.mongodb.retry-reads=true
spring.data.mongodb.max-retry-time=30000
spring.data.mongodb.application-name=RuleManager

# CORS: Comma-separated allowed origins (e.g. for Vercel: https://your-app.vercel.app). Trailing slashes and outer quotes are normalized.
# Set CORS_ALLOWED_ORIGINS in Render to your Vercel frontend URL(s)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
# Optional: comma-separated patterns (env CORS_ALLOWED_ORIGIN_PATTERNS), e.g. https://*.vercel.app for previews + production hostname variants
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

# JWT session tokens (validate() does not require MongoDB session row). Min 32 chars for HS256.
security.jwt.secret=${SECURITY_JWT_SECRET:}
# Production: set true so the app refuses to start without a strong SECURITY_JWT_SECRET (no dev fallback).
security.jwt.fail-on-weak-secret=${JWT_FAIL_ON_WEAK_SECRET:false}

# Security Configuration
# Request size limits
server.tomcat.max-http-post-size=1000MB
server.tomcat.max-http-form-post-size=1000MB

# Security headers (will be enforced by SecurityConfig)
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Rate limiting configuration
security.rate-limit.login.max-attempts=5
security.rate-limit.login.window-minutes=15
security.rate-limit.api.max-requests=100
security.rate-limit.api.window-minutes=1
# Per-IP cap on /api/** (excludes /api/login). In-memory only — not shared across scaled instances.
security.rate-limit.api.enabled=true

# Non-upload JSON/XML body cap (multipart and /api/upload, bulk-upload exempt). Set 0 to disable check when Content-Length is set.
security.request.body-limit.enabled=true
security.request.body-limit.max-bytes=10485760

# HttpOnly JWT cookie (optional). Cross-origin SPA (e.g. Vercel → Render): set secure=true, same-site=None, CORS allowCredentials already required.
security.auth.jwt-cookie-enabled=false
security.auth.jwt-cookie-name=OP_JWT
security.auth.jwt-cookie-secure=false
security.auth.jwt-cookie-same-site=Lax

# CSRF for HttpOnly JWT cookie: login returns csrfToken; client sends X-CSRF-Token on POST/PUT/PATCH/DELETE.
# Leave empty to auto-enable when jwt-cookie-enabled=true; set false to disable even with cookie.
security.csrf.login-header.enabled=

# Optional hCaptcha on login (header X-Captcha-Token). provider=hcaptcha and secret required.
security.captcha.provider=${CAPTCHA_PROVIDER:none}
security.captcha.hcaptcha.secret=${HCAPTCHA_SECRET:}

# Session configuration
security.session.duration-minutes=45
security.session.max-concurrent-sessions=5

# Password policy
# BCrypt log rounds (4–31). Higher = slower login, stronger against offline guessing. Default 12.
security.password.bcrypt-strength=12
security.password.min-length=8
security.password.require-uppercase=true
security.password.require-lowercase=true
security.password.require-digit=true
security.password.require-special=true

# Default admin credentials - SECURITY: Set via environment variables, never hardcode
security.admin.default-username=${ADMIN_USERNAME:}
security.admin.default-password=${ADMIN_PASSWORD:}
security.admin.default-display-name=${ADMIN_DISPLAY_NAME:admin}

# HTTPS Configuration
# SECURITY: Enable HTTPS in production
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEYSTORE:}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-store-type=${SSL_KEYSTORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:}
server.ssl.trust-store=${SSL_TRUSTSTORE:}
server.ssl.trust-store-password=${SSL_TRUSTSTORE_PASSWORD:}

# HTTP to HTTPS redirect (configure reverse proxy or use HttpsConfig)
# PORT is set by Render; SERVER_PORT for local/docker override
server.port=${PORT:${SERVER_PORT:8080}}

# Force HTTPS in production (set to true in production)
security.force-https=${FORCE_HTTPS:false}

# Encryption Configuration
# SECURITY: Set encryption key via environment variable SECURITY_ENCRYPTION_KEY
# Generate key: openssl rand -base64 32 (must decode to exactly 32 bytes)
security.encryption.key=${SECURITY_ENCRYPTION_KEY:}
# Production: set true so startup fails if SECURITY_ENCRYPTION_KEY is unset (no random in-memory key).
security.encryption.fail-if-missing-key=${ENCRYPTION_FAIL_IF_MISSING:false}

# Actuator (Render health check: /actuator/health)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Local Atlas (no profile needed): optional imports override mongo_uri above — last wins.
# 1) src/main/resources/application-local.properties (gitignored, on classpath after compile)
# 2) project root .env.local.properties — see .env.local.properties.example
spring.config.import=optional:classpath:application-local.properties,optional:file:${user.dir}/.env.local.properties

# Active with SPRING_PROFILES_ACTIVE=prod (set on Render). Redis is off unless a URL is set — see DisableRedisUnlessConfiguredEnvironmentPostProcessor.

# CORS: set CORS_ALLOWED_ORIGINS for custom domains (e.g. https://app.example.com).
# Default pattern below allows any https://*.vercel.app (previews + *.vercel.app deployments). Override with CORS_ALLOWED_ORIGIN_PATTERNS if needed.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app}

server.forward-headers-strategy=framework

# Faster, more predictable Kubernetes rollouts: avoid blocking startup on index creation (manage indexes in Atlas if needed).
spring.data.mongodb.auto-index-creation=false
# Fewer connections opened during startup; pool grows on demand.
spring.data.mongodb.min-connection-pool-size=0

# Separate liveness/readiness for probes (use /actuator/health/liveness and /actuator/health/readiness in K8s).
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

security.jwt.fail-on-weak-secret=true
security.encryption.fail-if-missing-key=true

# Upstash / Render: prefer SPRING_DATA_REDIS_URL; REDIS_URL also works if that is what you created in the dashboard.
spring.data.redis.url=${SPRING_DATA_REDIS_URL:${REDIS_URL:}}
# Slightly tolerant connect for serverless / TLS (rediss://)
spring.data.redis.connect-timeout=10s
spring.data.redis.timeout=10s

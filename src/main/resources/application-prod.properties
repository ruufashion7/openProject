# Active with SPRING_PROFILES_ACTIVE=prod (set on Render). Redis is off unless a URL is set — see DisableRedisUnlessConfiguredEnvironmentPostProcessor.

server.forward-headers-strategy=framework

security.jwt.fail-on-weak-secret=true
security.encryption.fail-if-missing-key=true

# Upstash / Render: prefer SPRING_DATA_REDIS_URL; REDIS_URL also works if that is what you created in the dashboard.
spring.data.redis.url=${SPRING_DATA_REDIS_URL:${REDIS_URL:}}
# Slightly tolerant connect for serverless / TLS (rediss://)
spring.data.redis.connect-timeout=10s
spring.data.redis.timeout=10s
